# docker-compose.yml — JVM 模式（标准构建）
# 使用方式: docker compose up -d --build
#
# 使用 JVM 模式运行，构建速度快，适合开发和标准部署

services:
  mysqldb:
    image: mysql:8
    environment:
      MYSQL_DATABASE: appforge
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  appforge:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      mysqldb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: redis
      DB_USERNAME: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-123}
      JWT_SECRET: ${JWT_SECRET:-5/jDAWs7a63GRgjS+uF2mP7dcLwI6GAgxf+Z0+fOAbgMR/jksG5r0v10nDOkrM0btxtb2FAuol8fSzSJis8gIA==}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_USER_MASTER_URL: jdbc:mysql://mysqldb:3306/appforge?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_USER_SLAVE_URL: jdbc:mysql://mysqldb:3306/appforge?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_TASK_MASTER_URL: jdbc:mysql://mysqldb:3306/appforge?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_TASK_SLAVE_URL: jdbc:mysql://mysqldb:3306/appforge?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_USER_MASTER_USERNAME: root
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_USER_MASTER_PASSWORD: ${DB_ROOT_PASSWORD:-123}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_USER_SLAVE_USERNAME: root
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_USER_SLAVE_PASSWORD: ${DB_ROOT_PASSWORD:-123}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_TASK_MASTER_USERNAME: root
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_TASK_MASTER_PASSWORD: ${DB_ROOT_PASSWORD:-123}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_TASK_SLAVE_USERNAME: root
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_TASK_SLAVE_PASSWORD: ${DB_ROOT_PASSWORD:-123}
    volumes:
      - ./logs:/app/logs

  appforge-admin:
    build:
      context: ../../AppForgeAdmin
      dockerfile: Dockerfile
    depends_on:
      - appforge
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
